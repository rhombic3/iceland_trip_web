name: Update live Iceland travel data

on:
  workflow_dispatch:
  schedule:
    # Before the trip: once per day, Jan 1 - Jun 6.
    # GitHub Actions cron uses UTC; Iceland is UTC+0.
    - cron: "0 8 * 1-5 *"
    - cron: "0 8 1-6 6 *"

    # During the trip: every 15 minutes, Jun 7 - Jun 17.
    - cron: "*/15 * 7-17 6 *"

permissions:
  contents: write

jobs:
  update-live-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate live data
        run: python scripts/update_live_data.py

      - name: Commit updated live data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/live-data.json
          git diff --cached --quiet || git commit -m "Update live Iceland weather and road data"
          git push